name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Checks and Package Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Show tool versions
        run: |
          node --version
          npm --version
          bun --version

      - name: Run checks
        run: bun run ci:check

      - name: Package dry run
        run: npm run package:check

  anvil-fork-e2e:
    name: Anvil Fork E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    env:
      ANVIL_FORK_URLS_ETHEREUM: |
        https://ethereum.publicnode.com
        https://rpc.flashbots.net

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Show tool versions
        run: |
          bun --version
          anvil --version
          cast --version

      - name: Run anvil fork e2e
        run: bun run test:e2e:anvil
